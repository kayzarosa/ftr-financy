services:
  backend:
    build:
      context: .
    ports:
      - "3333:3333"
    env_file:
      - ./.env
    environment:
      # sobrescreve o DATABASE_URL do .env local para apontar para o volume
      # persistente do container, em vez do arquivo solto usado em dev.
      DATABASE_URL: file:./data/dev.db
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

volumes:
  backend_data:
